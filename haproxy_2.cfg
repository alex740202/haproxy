global
	log /dev/log	local0
	log /dev/log	local1 notice
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

	# Default SSL material locations
	ca-base /etc/ssl/certs
	crt-base /etc/ssl/private

	# See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
        ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
        ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
        ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
	log	global
	mode	http
	option	httplog
	option	dontlognull
        timeout connect 5000
        timeout client  50000
        timeout server  50000
	errorfile 400 /etc/haproxy/errors/400.http
	errorfile 403 /etc/haproxy/errors/403.http
	errorfile 408 /etc/haproxy/errors/408.http
	errorfile 500 /etc/haproxy/errors/500.http
	errorfile 502 /etc/haproxy/errors/502.http
	errorfile 503 /etc/haproxy/errors/503.http
	errorfile 504 /etc/haproxy/errors/504.http

listen stats  # веб-страница со статистикой
        bind                    :888
        mode                    http
        stats                   enable
        stats uri               /stats
        stats refresh           5s
        stats realm             Haproxy\ Statistics

# Фронтенд - обрабатывает только запросы к example.local
frontend web_frontend
    bind :8088
    mode http
    # ACL для проверки домена example.local
    acl is_example_local hdr(host) -i example.local
    
    # Использовать бэкенд только для example.local
    use_backend weighted_backend if is_example_local
    
    # Для всех остальных запросов возвращаем 403
    default_backend forbidden_backend

# Бэкенд с Weighted Round Robin (веса: 2, 3, 4)
backend weighted_backend
    mode http
    balance roundrobin
    
    # Серверы с разными весами
    # Вес 2: будет получать ~22.2% трафика (2/9)
    server server1 127.0.0.1:8888 weight 2 check inter 3s rise 2 fall 3
    # Вес 3: будет получать ~33.3% трафика (3/9)
    server server2 127.0.0.1:9999 weight 3 check inter 3s rise 2 fall 3
    # Вес 4: будет получать ~44.4% трафика (4/9)
    server server3 127.0.0.1:7777 weight 4 check inter 3s rise 2 fall 3

# Бэкенд для запрещённых запросов (не example.local)
backend forbidden_backend
    mode http
    http-request deny deny_status 403
